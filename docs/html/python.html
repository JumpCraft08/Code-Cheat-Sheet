<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="JumpCraft">
  <meta name="description" content="Resumen visual de los conceptos básicos de Python.">
  <title>Columnas con Cards Ajustables</title>
  <link href="../css/style.css" rel="stylesheet" type="text/css">
  <link href="../css/modal.css" rel="stylesheet" type="text/css">
  <link href="../css/modal-body.css" rel="stylesheet" type="text/css">
  <link href="../css/indicators-python.css" rel="stylesheet" type="text/css">
</head>
<body>
  <main class="wallpaper">

    <div class="columna">

      <label for="modal-lang-selector" class="title">Python Core</label>

      <div class="card" data-title="Fundamentos" style="--card-color: #3776ab;" role="group" aria-label="Fundamentos">
        <label for="modal-card-1-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-1-1">Tipos de Datos</label></td></tr>
          <tr><td><label for="modal-card-1-2">Variables</label></td></tr>
          <tr><td><label for="modal-card-1-3">Operadores</label></td></tr>
          <tr><td><label for="modal-card-1-4">Strings</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Control de Flujo" style="--card-color: #dd9b00;" role="group" aria-label="Control de Flujo">
        <label for="modal-card-2-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-2-1">if / elif / else</label></td></tr>
          <tr><td><label for="modal-card-2-2">for / while</label></td></tr>
          <tr><td><label for="modal-card-2-3">break / continue / pass</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Errores" style="--card-color: #0ea5e9;" role="group" aria-label="Errores">
        <label for="modal-card-3-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-3-1">Excepciones</label></td></tr>
          <tr><td><label for="modal-card-3-2">Custom Exceptions</label></td></tr>
          <tr><td><label for="modal-card-3-3">try / except / finally</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">
      <div class="card" data-title="OOP en Python" style="--card-color: #2563eb;" role="group" aria-label="OOP en Python">
        <label for="modal-card-4-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-4-1">Constructores (__init__)</label></td></tr>
          <tr><td><label for="modal-card-4-2">Métodos</label></td></tr>
          <tr><td><label for="modal-card-4-3">Encapsulación</label></td></tr>
          <tr><td><label for="modal-card-4-4">Abstracción</label></td></tr>
          <tr><td><label for="modal-card-4-5">Herencia</label></td></tr>
          <tr><td><label for="modal-card-4-6">Polimorfismo</label></td></tr>
          <tr><td><label for="modal-card-4-7">Magic Methods</label></td></tr>
          <tr><td><label for="modal-card-4-8">Dataclasses</label></td></tr>
          <tr><td><label for="modal-card-4-9">Duck Typing</label></td></tr>
          <tr><td><label for="modal-card-4-10">Metaclasses</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Avanzado" style="--card-color: #ef4444;" role="group" aria-label="Avanzado">
        <label for="modal-card-5-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-5-1">Lambdas</label></td></tr>
          <tr><td><label for="modal-card-5-2">Decoradores</label></td></tr>
          <tr><td><label for="modal-card-5-3">Generators / yield</label></td></tr>
          <tr><td><label for="modal-card-5-4">Context Managers</label></td></tr>
          </tbody>
        </table>
      </div>

          <tr><td><label for="modal-card-6-2">Multiprocessing</label></td></tr>
          <tr><td><label for="modal-card-6-3">Asyncio</label></td></tr>
          <tr><td><label for="modal-card-6-4">Locks</label></td></tr>
          <tr><td><label for="modal-card-6-5">Futures</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Estructuras de Datos" style="--card-color: #9333ea;" role="group" aria-label="Estructuras de Datos">
        <label for="modal-card-7-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-7-1">List</label></td></tr>
          <tr><td><label for="modal-card-7-2">Tuple</label></td></tr>
          <tr><td><label for="modal-card-7-3">Set</label></td></tr>

          <tr><td><label for="modal-card-7-6">Heapq</label></td></tr>

          <tr><td><label for="modal-card-7-8">Iterators</label></td></tr>
          <tr><td><label for="modal-card-7-9">Comprehensions</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">
      <div class="card" data-title="Networking" style="--card-color: #1e40af;" role="group" aria-label="Networking">
        <label for="modal-card-8-0" class="title-label"></label>
        <table>
          <tbody>
            <tr><td><label for="modal-card-8-1">Sockets</label></td></tr>
            <tr><td><label for="modal-card-8-2">Requests / HTTP</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Seguridad" style="--card-color: #ef4444;" role="group" aria-label="Seguridad">
        <label for="modal-card-9-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-9-1">Hashlib</label></td></tr>
          <tr><td><label for="modal-card-9-2">Cryptography</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Python Stdlib" style="--card-color: #eab308;" role="group" aria-label="Python Stdlib">
        <label for="modal-card-10-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-10-1">Math</label></td></tr>

          <tr><td><label for="modal-card-11-2">PIP</label></td></tr>
          <tr><td><label for="modal-card-11-3">Virtualenv</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">

      <div class="card" data-title="Entrada / Salida" style="--card-color: #eab308;" role="group" aria-label="Entrada / Salida">
        <label for="modal-card-12-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-12-1">Files</label></td></tr>
          <tr><td><label for="modal-card-12-2">IO Streams</label></td></tr>
          <tr><td><label for="modal-card-12-3">Input</label></td></tr>
          <tr><td><label for="modal-card-12-4">Pickle / JSON</label></td></tr>

        <label for="modal-card-14-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-14-1">Módulos / Packages</label></td></tr>
          <tr><td><label for="modal-card-14-2">Versiones</label></td></tr>
          <tr><td><label for="modal-card-14-3">Ecosistema</label></td></tr>
          </tbody>

      <div class="button-group">
        <button class="title-button">1</button>
        <button class="title-button">2</button>
        <button class="title-button">3</button>
        <button class="title-button">4</button>
      </div>

    </div>
  </main>
  <div class="modals">

    <!-- Modal Selector de Lenguaje -->
      <input type="checkbox" id="modal-lang-selector" class="modal-toggle">
      <div class="modal">
        <label for="modal-lang-selector" class="modal-overlay"></label>
        <div class="modal-content">

          <!-- Slide único -->
          <input type="radio" name="slides-lang" id="slide-lang-1" checked>
          <div class="slide" data-title="Cambiar Code-Sheet">
            <div style="display: flex; flex-direction: column; padding: 1.5em; gap: 0.8em;">
              <a href="java.html" class="lang-option" style="--lang-color:#f89820;">Java Core</a>
              <label for="modal-lang-selector" class="lang-option" style="--lang-color:#3776ab;">Python</label>
              <a href="cpp.html" class="lang-option" style="--lang-color:#00599C;">C++</a>
              <a href="javascript.html" class="lang-option" style="--lang-color:#f7df1e;">JavaScript</a>
              <a href="kotlin.html" class="lang-option" style="--lang-color:#7f52ff;">Kotlin</a>
            </div>
          </div>
          <label for="modal-lang-selector" class="close-button"></label>
        </div>

</html>
