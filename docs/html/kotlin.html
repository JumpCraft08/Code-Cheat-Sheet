<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="JumpCraft">
  <meta name="description" content="Resumen visual de los conceptos básicos de Kotlin.">
  <title>Columnas con Cards Ajustables</title>
  <link href="../css/style.css" rel="stylesheet" type="text/css">
  <link href="../css/modal.css" rel="stylesheet" type="text/css">
  <link href="../css/modal-body.css" rel="stylesheet" type="text/css">
  <link href="../css/indicators-kotlin.css" rel="stylesheet" type="text/css">
</head>
<body>
  <main class="wallpaper">

    <div class="columna">

      <label for="modal-lang-selector" class="title">Kotlin Core</label>

      <div class="card" data-title="Fundamentos" style="--card-color: #7f52ff;" role="group" aria-label="Fundamentos">
        <label for="modal-card-1-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-1-1">Tipos de Datos</label></td></tr>
          <tr><td><label for="modal-card-1-2">Variables (val / var)</label></td></tr>
          <tr><td><label for="modal-card-1-3">Operadores</label></td></tr>
          <tr><td><label for="modal-card-1-4">Strings & Templates</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Control de Flujo" style="--card-color: #dd9b00;" role="group" aria-label="Control de Flujo">
        <label for="modal-card-2-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-2-1">if / when</label></td></tr>
          <tr><td><label for="modal-card-2-2">Bucles (for / while)</label></td></tr>
          <tr><td><label for="modal-card-2-3">Break / Continue / Return</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Null Safety" style="--card-color: #0ea5e9;" role="group" aria-label="Null Safety">
        <label for="modal-card-3-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-3-1">Nullable Types</label></td></tr>
          <tr><td><label for="modal-card-3-2">Safe Call (?.)</label></td></tr>
          <tr><td><label for="modal-card-3-3">Elvis Operator (?:)</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">
      <div class="card" data-title="Kotlin OOP" style="--card-color: #2563eb;" role="group" aria-label="Kotlin OOP">
        <label for="modal-card-4-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-4-1">Constructores</label></td></tr>
          <tr><td><label for="modal-card-4-2">Funciones</label></td></tr>
          <tr><td><label for="modal-card-4-3">Modificadores</label></td></tr>
          <tr><td><label for="modal-card-4-4">Clases / Objetos</label></td></tr>
          <tr><td><label for="modal-card-4-5">Data Classes</label></td></tr>
          <tr><td><label for="modal-card-4-6">Herencia</label></td></tr>
          <tr><td><label for="modal-card-4-7">Polimorfismo</label></td></tr>
          <tr><td><label for="modal-card-4-8">Enum Classes</label></td></tr>
          <tr><td><label for="modal-card-4-9">Generics</label></td></tr>
          <tr><td><label for="modal-card-4-10">Nested / Inner Classes</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Kotlin Avanzado" style="--card-color: #ef4444;" role="group" aria-label="Kotlin Avanzado">
        <label for="modal-card-5-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-5-1">Lambdas</label></td></tr>
          <tr><td><label for="modal-card-5-2">Higher-Order Functions</label></td></tr>
          <tr><td><label for="modal-card-5-3">Sealed Classes</label></td></tr>
          <tr><td><label for="modal-card-5-4">Extension Functions</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">
      <div class="card" data-title="Coroutines" style="--card-color: #0ea5e9;" role="group" aria-label="Coroutines">
        <label for="modal-card-6-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-6-1">Launch / Async</label></td></tr>
          <tr><td><label for="modal-card-6-2">Dispatchers</label></td></tr>
          <tr><td><label for="modal-card-6-3">Scopes</label></td></tr>
          <tr><td><label for="modal-card-6-4">Flows</label></td></tr>
          <tr><td><label for="modal-card-6-5">Suspend Functions</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Colecciones" style="--card-color: #9333ea;" role="group" aria-label="Colecciones">
        <label for="modal-card-7-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-7-1">Array</label></td></tr>
          <tr><td><label for="modal-card-7-2">List</label></td></tr>
          <tr><td><label for="modal-card-7-3">Set</label></td></tr>
          <tr><td><label for="modal-card-7-4">Map</label></td></tr>
          <tr><td><label for="modal-card-7-5">Mutable vs Inmutable</label></td></tr>
          <tr><td><label for="modal-card-7-6">Sequences</label></td></tr>
          <tr><td><label for="modal-card-7-7">Comparators</label></td></tr>
          <tr><td><label for="modal-card-7-8">Iterators</label></td></tr>
          <tr><td><label for="modal-card-7-9">Collection Operations</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">
      <div class="card" data-title="Networking" style="--card-color: #1e40af;" role="group" aria-label="Networking">
        <label for="modal-card-8-0" class="title-label"></label>
        <table>
          <tbody>
            <tr><td><label for="modal-card-8-1">Ktor</label></td></tr>
            <tr><td><label for="modal-card-8-2">HTTP Clients</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Seguridad" style="--card-color: #ef4444;" role="group" aria-label="Seguridad">
        <label for="modal-card-9-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-9-1">Cifrado</label></td></tr>
          <tr><td><label for="modal-card-9-2">Hashing</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Kotlin Stdlib" style="--card-color: #eab308;" role="group" aria-label="Kotlin Stdlib">
        <label for="modal-card-10-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-10-1">Math</label></td></tr>
          <tr><td><label for="modal-card-10-2">Date / Time</label></td></tr>
          <tr><td><label for="modal-card-10-3">Regex</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Compilación" style="--card-color: #0ea5e9;" role="group" aria-label="Compilación">
        <label for="modal-card-11-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-11-1">Kotlin Compiler</label></td></tr>
          <tr><td><label for="modal-card-11-2">JVM / Native / JS</label></td></tr>
          <tr><td><label for="modal-card-11-3">KDoc</label></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="columna">

      <div class="card" data-title="Entrada / Salida" style="--card-color: #eab308;" role="group" aria-label="Entrada / Salida">
        <label for="modal-card-12-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-12-1">Files</label></td></tr>
          <tr><td><label for="modal-card-12-2">Streams</label></td></tr>
          <tr><td><label for="modal-card-12-3">ReadLine</label></td></tr>
          <tr><td><label for="modal-card-12-4">Serialization</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Memoria" style="--card-color: #9333ea;" role="group" aria-label="Memoria">
        <label for="modal-card-13-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-13-1">Stack vs Heap</label></td></tr>
          <tr><td><label for="modal-card-13-2">Garbage Collector</label></td></tr>
          <tr><td><label for="modal-card-13-3">Referencias</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card" data-title="Kotlin Misc" style="--card-color: #ef4444;" role="group" aria-label="Kotlin Misc">
        <label for="modal-card-14-0" class="title-label"></label>
        <table>
          <tbody>
          <tr><td><label for="modal-card-14-1">Paquetes</label></td></tr>
          <tr><td><label for="modal-card-14-2">Versiones</label></td></tr>
          <tr><td><label for="modal-card-14-3">Multiplatform</label></td></tr>
          </tbody>
        </table>
      </div>

      <div class="button-group">
        <button class="title-button">1</button>
        <button class="title-button">2</button>
        <button class="title-button">3</button>
        <button class="title-button">4</button>
      </div>

    </div>
  </main>
</body>
</html>
